name: Node.js Server CI

# This is the "on" section that was missing or empty
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Express Tests
        # Added the ENV variable to prevent Port 3000 conflicts
        run: NODE_ENV=test npm test